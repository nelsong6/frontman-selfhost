apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontman-server
  namespace: frontman-selfhost
  labels:
    app: frontman-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontman-server
  template:
    metadata:
      annotations:
        frontman-selfhost/image-revision: "404bc32d37847fc2124512089e4d5a614a37ab30"
      labels:
        app: frontman-server
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: server
          image: ghcr.io/nelsong6/frontman-selfhost:build-25796632301-1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
          args:
            - /app/bin/migrate && exec /app/bin/server
          env:
            - name: PHX_SERVER
              value: "true"
            - name: PORT
              value: "4000"
            - name: PHX_HOST
              value: frontman-1.glimmung.dev.romaine.life
            - name: DATABASE_URL
              value: ecto://postgres:postgres@postgres.frontman-selfhost.svc.cluster.local/frontman_server_dev
            - name: DATABASE_SSL
              value: "false"
            - name: FRONTMAN_ENABLE_SIGNUP_WORKERS
              value: "false"
          envFrom:
            - secretRef:
                name: frontman-server-secrets
          ports:
            - name: http
              containerPort: 4000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 24
---
apiVersion: v1
kind: Service
metadata:
  name: frontman-server
  namespace: frontman-selfhost
spec:
  selector:
    app: frontman-server
  ports:
    - name: http
      port: 80
      targetPort: http
